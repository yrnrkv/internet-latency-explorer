services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: latency
      POSTGRES_PASSWORD: latency
      POSTGRES_DB: latency
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latency"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://latency:latency@postgres:5432/latency
      REDIS_URL: redis://redis:6379
      API_KEYS: '["dev-api-key"]'
      ALLOWED_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  probe-simulator:
    build: ./probes
    environment:
      API_URL: http://backend:8000
      API_KEY: dev-api-key
      INTERVAL_SECONDS: "10"
    volumes:
      - ./scripts:/scripts
    command: ["python", "/scripts/simulate_probes.py"]
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
